<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>
<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
padding:50px;
}

.chat-box{
width:80%;
max-width:700px;
height:400px;
margin:auto;
background:#111827;
border-radius:20px;
padding:20px;
}

input{
width:70%;
padding:12px;
border:none;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#00e5ff;
cursor:pointer;
}

.back{
margin-top:30px;
}
</style>
</head>
<body>

<h1>🤖 AI Chatbot</h1>

<div class="chat-box">
<p>Welcome to Arduino AI Assistant</p>
</div>

<br>

<input type="text" placeholder="Ask Arduino Question...">
<button>Send</button>

<br><br>

<button class="back" onclick="history.back()">
⬅ Back
</button>

</body>
</html>
