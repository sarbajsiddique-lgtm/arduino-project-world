<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arduino AI Site</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* 🎬 VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* 🌑 OVERLAY (FIXED) */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  pointer-events: none;   /* 🔥 IMPORTANT FIX */
  z-index: 0;
}

/* 🔝 NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  color: white;
  z-index: 10;
}

.navbar a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

/* 🎯 HERO */
.hero {
  position: relative;
  z-index: 2;   /* 🔥 IMPORTANT */
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  text-align: center;
}

/* 🧠 TITLE */
.hero h1 {
  font-size: 45px;
  margin-bottom: 30px;
}

/* 🚀 BUTTON */
.btn {
  padding: 15px 40px;
  font-size: 20px;
  border-radius: 30px;
  background: linear-gradient(45deg, #00ffcc, #00ccff);
  color: black;
  text-decoration: none;
  box-shadow: 0 0 20px #00ffcc;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>
  <div class="bg-animation">
<!-- ===== FUTURE WAVE BACKGROUND ===== -->

<div class="wave-bg">

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wave"></div>

<div class="flow"></div>
<div class="flow"></div
<div class="flow"></div>
<div class="flow"></div>
<div class="flow"></div>

</div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>

<div class="line"></div>
<div class="line"></div>
<div class="line"></div>

</div>
</div>

<video autoplay muted loop>
  <source src="intro.mp4" type="video/mp4">
</video>

<div class="hero">
  <h1>Welcome to Arduino World 🤖</h1>

  <!-- ✅ WORKING BUTTON -->
  <a href="login.html" class="btn">Start Learning 🚀</a>    
</div>

</body>
</html>
